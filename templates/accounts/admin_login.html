{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">

<div class="col-md-4">

<h2>
Admin Login
</h2>

<form method="post">

{% csrf_token %}

<div class="mb-3">

<label>
Username
</label>

<input
type="text"
name="username"
class="form-control">

</div>

<div class="mb-3">

<label>
Password
</label>

<input
type="password"
name="password"
class="form-control">

</div>

<button
class="btn btn-primary">

Login

</button>

</form>

{% if error %}

<div class="alert alert-danger mt-3">

{{ error }}

</div>

{% endif %}

</div>

</div>

{% endblock %}
