{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center mt-5">

    <div class="col-lg-5 col-md-6">

        <div class="card shadow border-0">

            <div class="card-header bg-dark text-white text-center">

                <h3 class="mb-0">

                    Administrator Login

                </h3>

            </div>

            <div class="card-body p-4">

                {% if error %}

                    <div class="alert alert-danger">

                        {{ error }}

                    </div>

                {% endif %}

                {% if messages %}

                    {% for message in messages %}

                        <div class="alert alert-success">

                            {{ message }}

                        </div>

                    {% endfor %}

                {% endif %}

                <form method="post">

                    {% csrf_token %}

                    <div class="mb-3">

                        <label class="form-label">

                            Username

                        </label>

                        <input
                            type="text"
                            name="username"
                            class="form-control"
                            placeholder="Enter username"
                            required
                        >

                    </div>

                    <div class="mb-4">

                        <label class="form-label">

                            Password

                        </label>

                        <input
                            type="password"
                            name="password"
                            class="form-control"
                            placeholder="Enter password"
                            required
                        >

                    </div>

                    <button
                        type="submit"
                        class="btn btn-dark w-100"
                    >

                        Login

                    </button>

                </form>

                <hr>

                <div class="text-center">

                    <a
                        href="{% url 'startup_login' %}"
                        class="btn btn-outline-primary w-100"
                    >

                        Startup Login

                    </a>

                </div>

                <hr>

                <div class="alert alert-light border mb-0">

                    <strong>

                        Demo Admin Credentials

                    </strong>

                    <br>

                    Username :
                    <strong>

                        admin

                    </strong>

                    <br>

                    Password :
                    <strong>

                        admin123

                    </strong>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
