{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">

<div class="col-md-4">

<h2>
Startup Login
</h2>

<form method="post">

    {% csrf_token %}

    {{ form.as_p }}

    <button
        class="btn btn-primary">

        Login

    </button>

</form>

{% if error %}

<div class="alert alert-danger mt-3">

    {{ error }}

</div>

{% endif %}

</div>

</div>

{% endblock %}
