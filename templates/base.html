<!DOCTYPE html>

<html>

<head>

<title>
Facility Booking
</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>

<body>

<nav class="navbar navbar-dark bg-dark">

<div class="container-fluid">

<a
class="navbar-brand"
href="/">

CIIC Facility Booking

</a>

<div>

<a
href="/dashboard/"
class="btn btn-outline-light">

Dashboard

</a>

<a
href="/my-bookings/"
class="btn btn-outline-light">

Bookings

</a>

<a
href="/calendar/"
class="btn btn-outline-light">

Calendar

</a>

<a
href="/notifications/"
class="btn btn-outline-light">

Notifications

{% if unread_notifications > 0 %}

<span
class="badge bg-danger">

{{ unread_notifications }}

</span>

{% endif %}

</a>

<a
href="/logout/"
class="btn btn-danger">

Logout

</a>

</div>

</div>

</nav>

<div class="container mt-4">

{% block content %}
{% endblock %}

</div>

</body>

</html>
