{% extends "base.html" %}

{% block content %}

<h2>
Notifications
</h2>

<table class="table table-bordered">

<thead>

<tr>

<th>
Title
</th>

<th>
Message
</th>

<th>
Date
</th>

</tr>

</thead>

<tbody>

{% for n in notifications %}

<tr>

<td>
{{ n.title }}
</td>

<td>
{{ n.message }}
</td>

<td>
{{ n.created_at }}
</td>

</tr>

{% empty %}

<tr>

<td colspan="3">

No Notifications

</td>

</tr>

{% endfor %}

</tbody>

</table>

{% endblock %}
